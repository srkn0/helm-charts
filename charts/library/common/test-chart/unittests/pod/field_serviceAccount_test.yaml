---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: pod - fields - serviceAccount
templates:
  - common.yaml
values:
  - ../_values/controllers_main_default_container.yaml
tests:
  - it: default creates release-named serviceAccount when global flag is enabled
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: release-name

  - it: default uses namespace default serviceAccount when global flag is disabled
    set:
      global:
        createDefaultServiceAccount: false
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default

  - it: with serviceAccount identifier should pass
    set:
      controllers:
        main:
          serviceAccount:
            identifier: mySA3
      serviceAccount:
        mySA3: {}
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: release-name

  - it: with non-existing serviceAccount identifier fail
    set:
      controllers:
        main:
          serviceAccount:
            identifier: mySA3
    asserts:
      - failedTemplate:
          errorMessage: "Controller 'main': No enabled ServiceAccount found with identifier 'mySA3'. Ensure a ServiceAccount with this identifier exists and is enabled under 'serviceAccounts.mySA3'."

  - it: with serviceAccount name should pass
    set:
      controllers:
        main:
          serviceAccount:
            name: mySA3
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: mySA3

  - it: with automatic serviceAccount detection should pass
    set:
      serviceAccount:
        mySA: {}
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: release-name

  - it: with global nameOverride should use nameOverride in auto-detected serviceAccountName
    set:
      global:
        nameOverride: my-override
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: release-name-my-override
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: release-name-my-override

  - it: with global nameOverride and serviceAccount identifier should use nameOverride in serviceAccountName
    set:
      global:
        nameOverride: my-override
      controllers:
        main:
          serviceAccount:
            identifier: mySA3
      serviceAccount:
        mySA3: {}
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: release-name-my-override
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: release-name-my-override
